name: Python CI
run-name: ${{ github.actor }} - ${{ github.sha }} # хто запустив та що запустили

on:
  push:
    branches: [main, develop]  # Запускати workflow при пуші в гілку main
  pull_request:
    branches: [main] # Запускати workflow при створенні pull request в гілку main

env:
  PYTHON_VERSION: 3.13 #

jobs:
  python-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov
          pip install -r requirements.txt
      
      - name: running tests
        run: |
          pytest -v tests/

      - name: generating coverage
        run: |
          pytest --cov=my_app --cov-report=none tests/

      - name: displaying the report
        run: |
          pytest --cov=my_app --cov-report=term tests/
      - name: Lint with flake8
        continue-on-error: true
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check code complexity with flake8
        continue-on-error: true
        run: flake8 . --max-complexity=10 --statistics

      - name: Upload Python code as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-source-code
          path: ./src

